name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    env:
      PRODUCT_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '1.0.0' }}

    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          # Strip leading 'v' and any pre-release suffix (e.g. v1.0.0-beta1 → 1.0.0)
          TAG="${GITHUB_REF_NAME#v}"
          MSI_VERSION="${TAG%%-*}"
          echo "PRODUCT_VERSION=$MSI_VERSION" >> "$GITHUB_ENV"
          echo "TAG_LABEL=$TAG" >> "$GITHUB_ENV"

      - name: Set default version
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        shell: bash
        run: |
          echo "PRODUCT_VERSION=1.0.0" >> "$GITHUB_ENV"
          echo "TAG_LABEL=1.0.0-dev" >> "$GITHUB_ENV"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      - name: Restore
        run: dotnet restore winsmtprelay.slnx

      - name: Build
        run: dotnet build winsmtprelay.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test winsmtprelay.slnx --no-build --configuration Release --verbosity normal

      # Publish both variants for MSI packaging
      - name: Publish Service (self-contained)
        run: >
          dotnet publish src/WinSmtpRelay.Service/WinSmtpRelay.Service.csproj
          -c Release -r win-x64 --self-contained true
          -o publish-sc/

      - name: Publish Service (framework-dependent)
        run: >
          dotnet publish src/WinSmtpRelay.Service/WinSmtpRelay.Service.csproj
          -c Release -r win-x64 --self-contained false
          -o publish-fd/

      # Code signing placeholder — uncomment when certificate is available
      # Requires GitHub secrets: CODE_SIGNING_CERTIFICATE (base64 PFX), CODE_SIGNING_PASSWORD
      #
      # - name: Decode signing certificate
      #   run: |
      #     $certBytes = [Convert]::FromBase64String("${{ secrets.CODE_SIGNING_CERTIFICATE }}")
      #     [IO.File]::WriteAllBytes("${{ runner.temp }}\cert.pfx", $certBytes)
      #
      # - name: Sign EXE (self-contained)
      #   run: >
      #     signtool sign /f "${{ runner.temp }}\cert.pfx"
      #     /p "${{ secrets.CODE_SIGNING_PASSWORD }}"
      #     /tr http://timestamp.digicert.com /td sha256 /fd sha256
      #     publish-sc/WinSmtpRelay.Service.exe
      #
      # - name: Sign EXE (framework-dependent)
      #   run: >
      #     signtool sign /f "${{ runner.temp }}\cert.pfx"
      #     /p "${{ secrets.CODE_SIGNING_PASSWORD }}"
      #     /tr http://timestamp.digicert.com /td sha256 /fd sha256
      #     publish-fd/WinSmtpRelay.Service.exe

      # Build MSI installers
      - name: Build MSI (self-contained)
        run: >
          dotnet build setup/WinSmtpRelay.Setup/WinSmtpRelay.Setup.wixproj
          -c Release
          -p:PublishDir=${{ github.workspace }}/publish-sc/
          -p:ProductVersion=${{ env.PRODUCT_VERSION }}
          -p:SelfContained=true

      - name: Build MSI (framework-dependent)
        run: >
          dotnet build setup/WinSmtpRelay.Setup/WinSmtpRelay.Setup.wixproj
          -c Release
          -p:PublishDir=${{ github.workspace }}/publish-fd/
          -p:ProductVersion=${{ env.PRODUCT_VERSION }}
          -p:SelfContained=false

      # Code signing placeholder — sign MSI files after build
      # - name: Sign MSI (self-contained)
      #   run: >
      #     signtool sign /f "${{ runner.temp }}\cert.pfx"
      #     /p "${{ secrets.CODE_SIGNING_PASSWORD }}"
      #     /tr http://timestamp.digicert.com /td sha256 /fd sha256
      #     setup/WinSmtpRelay.Setup/bin/Release/WinSmtpRelay-${{ env.PRODUCT_VERSION }}-x64-self-contained.msi
      #
      # - name: Sign MSI (framework-dependent)
      #   run: >
      #     signtool sign /f "${{ runner.temp }}\cert.pfx"
      #     /p "${{ secrets.CODE_SIGNING_PASSWORD }}"
      #     /tr http://timestamp.digicert.com /td sha256 /fd sha256
      #     setup/WinSmtpRelay.Setup/bin/Release/WinSmtpRelay-${{ env.PRODUCT_VERSION }}-x64.msi
      #
      # - name: Clean up certificate
      #   if: always()
      #   run: Remove-Item "${{ runner.temp }}\cert.pfx" -Force -ErrorAction SilentlyContinue

      # Upload MSI artifacts (always available for download from workflow run)
      - name: Upload MSI (self-contained)
        uses: actions/upload-artifact@v4
        with:
          name: WinSmtpRelay-${{ env.PRODUCT_VERSION }}-x64-self-contained
          path: setup/WinSmtpRelay.Setup/bin/Release/WinSmtpRelay-${{ env.PRODUCT_VERSION }}-x64-self-contained.msi

      - name: Upload MSI (framework-dependent)
        uses: actions/upload-artifact@v4
        with:
          name: WinSmtpRelay-${{ env.PRODUCT_VERSION }}-x64
          path: setup/WinSmtpRelay.Setup/bin/Release/WinSmtpRelay-${{ env.PRODUCT_VERSION }}-x64.msi

      # Create GitHub Release with MSI assets on tag push
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          IS_PRERELEASE=""
          if echo "$TAG_LABEL" | grep -qE "(alpha|beta|rc|preview)"; then
            IS_PRERELEASE="--prerelease"
          fi

          gh release create "$GITHUB_REF_NAME" \
            --title "WinSmtpRelay $TAG_LABEL" \
            --generate-notes \
            $IS_PRERELEASE \
            "setup/WinSmtpRelay.Setup/bin/Release/WinSmtpRelay-${PRODUCT_VERSION}-x64-self-contained.msi#WinSmtpRelay ${TAG_LABEL} (x64, self-contained)" \
            "setup/WinSmtpRelay.Setup/bin/Release/WinSmtpRelay-${PRODUCT_VERSION}-x64.msi#WinSmtpRelay ${TAG_LABEL} (x64, requires .NET 10)"
