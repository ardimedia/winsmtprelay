name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Tag build: v1.0.0-beta1 → VERSION=1.0.0, VERSION_SUFFIX=beta1, TAG_LABEL=1.0.0-beta1
            TAG="${GITHUB_REF_NAME#v}"
            echo "VERSION=${TAG%%-*}" >> "$GITHUB_ENV"
            if [[ "$TAG" == *-* ]]; then
              echo "VERSION_SUFFIX=${TAG#*-}" >> "$GITHUB_ENV"
            else
              echo "VERSION_SUFFIX=" >> "$GITHUB_ENV"
            fi
            echo "TAG_LABEL=$TAG" >> "$GITHUB_ENV"
          else
            # Non-tag build: use defaults from Directory.Build.props (1.0.0-beta1)
            echo "VERSION=1.0.0" >> "$GITHUB_ENV"
            echo "VERSION_SUFFIX=beta1" >> "$GITHUB_ENV"
            echo "TAG_LABEL=1.0.0-dev" >> "$GITHUB_ENV"
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      - name: Restore
        run: dotnet restore winsmtprelay.slnx

      - name: Build
        run: >
          dotnet build winsmtprelay.slnx --no-restore --configuration Release
          -p:Version=${{ env.VERSION }}
          -p:VersionSuffix=${{ env.VERSION_SUFFIX }}

      - name: Test
        run: dotnet test winsmtprelay.slnx --no-build --configuration Release --verbosity normal

      # Publish both variants for MSI packaging
      - name: Publish Service (self-contained)
        run: >
          dotnet publish src/WinSmtpRelay.Service/WinSmtpRelay.Service.csproj
          -c Release -r win-x64 --self-contained true
          -p:Version=${{ env.VERSION }}
          -p:VersionSuffix=${{ env.VERSION_SUFFIX }}
          -o ${{ github.workspace }}/publish-sc/

      - name: Publish Service (framework-dependent)
        run: >
          dotnet publish src/WinSmtpRelay.Service/WinSmtpRelay.Service.csproj
          -c Release -r win-x64 --self-contained false
          -p:Version=${{ env.VERSION }}
          -p:VersionSuffix=${{ env.VERSION_SUFFIX }}
          -o ${{ github.workspace }}/publish-fd/

      # Code signing placeholder — uncomment when certificate is available
      # Requires GitHub secrets: CODE_SIGNING_CERTIFICATE (base64 PFX), CODE_SIGNING_PASSWORD
      #
      # - name: Decode signing certificate
      #   run: |
      #     $certBytes = [Convert]::FromBase64String("${{ secrets.CODE_SIGNING_CERTIFICATE }}")
      #     [IO.File]::WriteAllBytes("${{ runner.temp }}\cert.pfx", $certBytes)
      #
      # - name: Sign EXE (self-contained)
      #   run: >
      #     signtool sign /f "${{ runner.temp }}\cert.pfx"
      #     /p "${{ secrets.CODE_SIGNING_PASSWORD }}"
      #     /tr http://timestamp.digicert.com /td sha256 /fd sha256
      #     publish-sc/WinSmtpRelay.Service.exe
      #
      # - name: Sign EXE (framework-dependent)
      #   run: >
      #     signtool sign /f "${{ runner.temp }}\cert.pfx"
      #     /p "${{ secrets.CODE_SIGNING_PASSWORD }}"
      #     /tr http://timestamp.digicert.com /td sha256 /fd sha256
      #     publish-fd/WinSmtpRelay.Service.exe

      # Verify publish output before MSI build
      - name: Verify publish output
        shell: bash
        run: |
          echo "=== Self-contained publish ==="
          ls -la publish-sc/ | head -20
          echo "File count: $(find publish-sc/ -type f | wc -l)"
          echo ""
          echo "=== Framework-dependent publish ==="
          ls -la publish-fd/ | head -20
          echo "File count: $(find publish-fd/ -type f | wc -l)"

      # Build MSI installers into separate output directories
      # Note: PublishDir must use backslashes — WiX HarvestDirectory fails with mixed slashes on Windows
      - name: Build MSI (self-contained)
        shell: pwsh
        run: >
          dotnet build setup/WinSmtpRelay.Setup/WinSmtpRelay.Setup.wixproj
          -c Release
          -p:PublishDir=${{ github.workspace }}\publish-sc\
          -p:ProductVersion=${{ env.VERSION }}
          -p:SelfContained=true
          -p:OutputPath=${{ github.workspace }}\msi-sc\

      - name: Build MSI (framework-dependent)
        shell: pwsh
        run: >
          dotnet build setup/WinSmtpRelay.Setup/WinSmtpRelay.Setup.wixproj
          -c Release
          -p:PublishDir=${{ github.workspace }}\publish-fd\
          -p:ProductVersion=${{ env.VERSION }}
          -p:SelfContained=false
          -p:OutputPath=${{ github.workspace }}\msi-fd\

      # Rename MSIs from default project name to descriptive filenames
      - name: Rename MSI files
        shell: bash
        run: |
          find msi-sc -name "WinSmtpRelay.Setup.msi" -exec mv {} "msi-sc/WinSmtpRelay-${VERSION}-x64-self-contained.msi" \;
          find msi-fd -name "WinSmtpRelay.Setup.msi" -exec mv {} "msi-fd/WinSmtpRelay-${VERSION}-x64.msi" \;

      # Code signing placeholder — sign MSI files after build
      # - name: Sign MSI (self-contained)
      #   run: >
      #     signtool sign /f "${{ runner.temp }}\cert.pfx"
      #     /p "${{ secrets.CODE_SIGNING_PASSWORD }}"
      #     /tr http://timestamp.digicert.com /td sha256 /fd sha256
      #     "msi-sc/WinSmtpRelay-${{ env.VERSION }}-x64-self-contained.msi"
      #
      # - name: Sign MSI (framework-dependent)
      #   run: >
      #     signtool sign /f "${{ runner.temp }}\cert.pfx"
      #     /p "${{ secrets.CODE_SIGNING_PASSWORD }}"
      #     /tr http://timestamp.digicert.com /td sha256 /fd sha256
      #     "msi-fd/WinSmtpRelay-${{ env.VERSION }}-x64.msi"
      #
      # - name: Clean up certificate
      #   if: always()
      #   run: Remove-Item "${{ runner.temp }}\cert.pfx" -Force -ErrorAction SilentlyContinue

      # Upload MSI artifacts (always available for download from workflow run)
      - name: Upload MSI (self-contained)
        uses: actions/upload-artifact@v4
        with:
          name: WinSmtpRelay-${{ env.VERSION }}-x64-self-contained
          path: msi-sc/WinSmtpRelay-${{ env.VERSION }}-x64-self-contained.msi

      - name: Upload MSI (framework-dependent)
        uses: actions/upload-artifact@v4
        with:
          name: WinSmtpRelay-${{ env.VERSION }}-x64
          path: msi-fd/WinSmtpRelay-${{ env.VERSION }}-x64.msi

      # Create GitHub Release with MSI assets on tag push
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          IS_PRERELEASE=""
          if echo "$TAG_LABEL" | grep -qE "(alpha|beta|rc|preview)"; then
            IS_PRERELEASE="--prerelease"
          fi

          gh release create "$GITHUB_REF_NAME" \
            --title "WinSmtpRelay $TAG_LABEL" \
            --generate-notes \
            $IS_PRERELEASE \
            "msi-sc/WinSmtpRelay-${VERSION}-x64-self-contained.msi#WinSmtpRelay ${TAG_LABEL} (x64, self-contained)" \
            "msi-fd/WinSmtpRelay-${VERSION}-x64.msi#WinSmtpRelay ${TAG_LABEL} (x64, requires .NET 10)"
