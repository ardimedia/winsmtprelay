name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      - name: Restore
        run: dotnet restore winsmtprelay.slnx

      - name: Build
        run: dotnet build winsmtprelay.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test winsmtprelay.slnx --no-build --configuration Release --verbosity normal
